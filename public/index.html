<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .auth-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card auth-card p-4 bg-white">
                <div class="card-body">
                    <h2 class="card-title text-center fw-bold mb-4 text-dark" id="form-title">ĐĂNG NHẬP</h2>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên tài khoản</label>
                        <input type="text" id="username" class="form-control form-control-lg" placeholder="Nhập tài khoản...">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <input type="password" id="password" class="form-control form-control-lg" placeholder="Nhập mật khẩu...">
                    </div>
                    <button class="btn btn-primary btn-lg w-100 fw-bold mb-3 shadow" id="submit-btn" onclick="handleAuth()">Đăng Nhập</button>
                    <div class="text-center">
                        <a href="#" class="text-decoration-none fw-medium" id="toggle-text" onclick="toggleForm()">Chưa có tài khoản? Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    let isLogin = true;
    function toggleForm() {
        isLogin = !isLogin;
        document.getElementById('form-title').innerText = isLogin ? 'ĐĂNG NHẬP' : 'ĐĂNG KÝ TÀI KHOẢN';
        document.getElementById('submit-btn').innerText = isLogin ? 'Đăng Nhập' : 'Đăng Ký Ngay';
        document.getElementById('toggle-text').innerText = isLogin ? 'Chưa có tài khoản? Đăng ký ngay' : 'Đã có tài khoản? Quay lại Đăng nhập';
        document.getElementById('submit-btn').className = isLogin ? "btn btn-primary btn-lg w-100 fw-bold mb-3 shadow" : "btn btn-success btn-lg w-100 fw-bold mb-3 shadow";
    }
    async function handleAuth() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if(!username || !password) return alert('Vui lòng nhập đủ thông tin!');
        const url = isLogin ? '/api/login' : '/api/register';
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            alert(data.message);
            if (isLogin) window.location.href = '/dashboard.html';
            else toggleForm();
        } else {
            alert(data.message);
        }
    }
</script>
</body>
</html>
